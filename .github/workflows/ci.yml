name: pView Alert System CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: pview_alerts
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: curl, mysqli, intl, mbstring, gd, xml, zip
          coverage: none

      - name: Validate Composer Configuration
        run: composer validate --strict

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Setup Environment File
        run: |
          cp .env.example .env
          sed -i "s/database.default.username = .*/database.default.username = 'root'/g" .env
          sed -i "s/database.default.password = .*/database.default.password = ''/g" .env
          sed -i "s/database.default.database = .*/database.default.database = 'pview_alerts'/g" .env

      - name: Verify PHP Syntax (Lint)
        run: |
          find app/ scripts/ tat_monitor.php -name "*.php" -type f -print0 | xargs -0 -n 1 -P 4 php -l

      - name: Import Database Schema
        run: |
          mysql --host 127.0.0.1 --port 3016 -u root -e "CREATE DATABASE IF NOT EXISTS pview_alerts CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;" || true
          mysql --host 127.0.0.1 --port 3306 -u root pview_alerts < scripts/alert_system_schema.sql
          php scripts/setup_defaults.php

      - name: Verify CodeIgniter Boots & Routes
        run: |
          php spark routes
